version: "3.9"

# ─────────────────────────────────────────────────────────
#  API Sentinel — docker-compose
#
#  Quick start (dev):
#    cp .env.example .env   # fill in GROQ_API_KEY
#    docker-compose up
#
#  Access:
#    Frontend  →  http://localhost:3000
#    Backend   →  http://localhost:8000
#    API docs  →  http://localhost:8000/docs
# ─────────────────────────────────────────────────────────

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Auth — leave blank to disable (dev mode)
      - SENTINEL_API_KEY=${SENTINEL_API_KEY:-}

      # ── LLM Configuration ──────────────────────────────
      # "groq" = cloud (fast, free tier available)
      # "ollama" = local (no API key needed, slower)
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}

      # Groq — get a free key at https://console.groq.com
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - GROQ_TEMPERATURE=${GROQ_TEMPERATURE:-0.2}

      # Ollama — only needed if LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - OLLAMA_DEFAULT_MODEL=${OLLAMA_DEFAULT_MODEL:-llama3.1:8b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-60}

      # CORS
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}

      # DB path inside the container (persisted via volume)
      - SENTINEL_DB_PATH=/data/sentinel.db

    volumes:
      - sentinel_data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    container_name: sentinel_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sentinel_data:
    driver: local